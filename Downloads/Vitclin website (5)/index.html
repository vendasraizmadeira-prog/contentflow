<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vit Clin — Uniformes & Scrubs Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#ebe2c5;--cream-light:#f5f0e4;--taupe:#b79b85;--taupe-dark:#8a7060;
      --dark:#1a1410;--dark-mid:#3a2e28;--bg:#f9f6ef;--white:#fff;--mid:#d4c4b0;
      --success:#4a7c59;--danger:#c0392b;
      --fd:'Playfair Display',Georgia,serif;--fb:'DM Sans',sans-serif;
    }
    html{scroll-behavior:smooth}
    body{font-family:var(--fb);background:var(--white);color:var(--dark);-webkit-font-smoothing:antialiased;overflow-x:hidden}
    img{max-width:100%;display:block}
    button{cursor:pointer;border:none;background:none;font-family:var(--fb)}
    a{text-decoration:none;color:inherit}
    input,select,textarea{font-family:var(--fb)}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--taupe);border-radius:3px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideR{from{transform:translateX(100%)}to{transform:translateX(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── ANNOUNCEMENT BAR ── */
    .ann-bar{background:var(--dark);color:var(--cream);overflow:hidden;height:36px;position:relative}
    .ann-track{display:flex;align-items:center;height:100%;animation:marquee 28s linear infinite;white-space:nowrap;width:max-content}
    .ann-track:hover{animation-play-state:paused}
    @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    .ann-item{padding:0 40px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;color:var(--cream)}
    .ann-sep{color:var(--taupe)}

    /* ── NAV ── */
    .nav-outer{position:sticky;top:0;z-index:100;background:white;border-bottom:1px solid #f0ede8}
    .nav-top{max-width:1280px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .nav-logo{font-family:var(--fd);font-size:22px;font-weight:600;color:var(--dark);letter-spacing:1px;display:flex;align-items:center;gap:8px}
    .nav-links{display:flex;gap:0;align-items:stretch;height:100%}
    .nav-link{padding:0 16px;font-size:13px;font-weight:500;letter-spacing:.5px;color:var(--dark-mid);display:flex;align-items:center;gap:4px;cursor:pointer;position:relative;transition:color .2s;white-space:nowrap}
    .nav-link:hover{color:var(--dark)}
    .nav-link::after{content:"";position:absolute;bottom:0;left:16px;right:16px;height:2px;background:var(--dark);transform:scaleX(0);transition:transform .2s}
    .nav-link:hover::after{transform:scaleX(1)}
    .nav-link.active::after{transform:scaleX(1)}
    .nav-icons{display:flex;align-items:center;gap:8px}
    .nav-icon-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--dark-mid);transition:background .15s}
    .nav-icon-btn:hover{background:#f5f0e8}
    .cart-badge{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:var(--dark);color:white;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}

    /* dropdown */
    .dropdown{position:relative}
    .dropdown-menu{display:none;position:absolute;top:100%;left:0;background:white;border:1px solid #f0ede8;border-top:none;min-width:200px;box-shadow:0 8px 24px rgba(0,0,0,.08);z-index:200}
    .dropdown:hover .dropdown-menu{display:block}
    .dropdown-item{display:block;padding:12px 20px;font-size:13px;color:var(--dark-mid);transition:background .15s;cursor:pointer}
    .dropdown-item:hover{background:var(--cream-light);color:var(--dark)}

    /* mobile nav */
    .nav-burger{display:none}
    .nav-drawer{display:none;position:fixed;inset:0;z-index:300}
    .nav-drawer.open{display:block}
    .nav-drawer-bg{position:absolute;inset:0;background:rgba(0,0,0,.4)}
    .nav-drawer-panel{position:absolute;left:0;top:0;bottom:0;width:280px;background:white;overflow-y:auto;display:flex;flex-direction:column}
    .nav-drawer-link{padding:16px 24px;font-size:15px;font-weight:500;color:var(--dark);border-bottom:1px solid #f5f0e8;cursor:pointer;display:flex;justify-content:space-between;align-items:center}

    /* ── HERO CAROUSEL ── */
    .hero-carousel{position:relative;overflow:hidden;background:var(--cream-light)}
    .hero-slides{display:flex;transition:transform .5s ease}
    .hero-slide{min-width:100%;position:relative}
    .hero-slide-inner{display:grid;grid-template-columns:1fr 1fr;min-height:520px}
    .hero-text{display:flex;flex-direction:column;justify-content:center;padding:80px 80px 80px 64px}
    .hero-img-col{overflow:hidden}
    .hero-img-col img{width:100%;height:100%;object-fit:cover;object-position:center top}
    .hero-dots{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:10}
    .hero-dot{width:7px;height:7px;border-radius:50%;background:rgba(26,20,16,.25);cursor:pointer;transition:all .2s}
    .hero-dot.active{background:var(--dark);width:22px;border-radius:4px}
    .hero-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:10;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.12);transition:all .2s;cursor:pointer}
    .hero-arrow:hover{background:white;box-shadow:0 4px 20px rgba(0,0,0,.18)}

    /* ── CATEGORY BANNERS ── */
    .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:1280px;margin:40px auto;padding:0 24px}
    .cat-card{position:relative;overflow:hidden;border-radius:12px;cursor:pointer;aspect-ratio:3/4}
    .cat-card img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
    .cat-card:hover img{transform:scale(1.04)}
    .cat-label{position:absolute;bottom:0;left:0;right:0;padding:24px 18px 18px;background:linear-gradient(transparent,rgba(26,20,16,.65));color:white;font-family:var(--fd);font-size:18px;font-weight:400}
    .cat-label span{display:block;font-family:var(--fb);font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.75;margin-bottom:4px}

    /* ── SECTION HEADER ── */
    .sec-head{max-width:1280px;margin:0 auto;padding:40px 24px 24px;display:flex;justify-content:space-between;align-items:baseline}
    .sec-title{font-family:var(--fd);font-size:clamp(20px,3vw,28px);font-weight:400;color:var(--dark)}
    .sec-link{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--taupe-dark);text-decoration:underline;cursor:pointer}

    /* ── PRODUCT GRID ── */
    .prod-grid{max-width:1280px;margin:0 auto;padding:0 24px 60px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

    /* ── PRODUCT CARD ── */
    .pcard{position:relative;cursor:pointer}
    .pcard-img{position:relative;overflow:hidden;border-radius:10px;background:var(--cream-light);aspect-ratio:3/4}
    .pcard-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
    .pcard:hover .pcard-img img{transform:scale(1.04)}
    .pcard-badge{position:absolute;top:10px;left:10px;background:var(--dark);color:var(--cream);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:20px}
    .pcard-free{position:absolute;top:10px;right:10px;background:var(--success);color:white;font-size:9px;font-weight:600;letter-spacing:.8px;padding:3px 8px;border-radius:20px}
    .pcard-discount{position:absolute;top:10px;left:10px;background:#e74c3c;color:white;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
    .pcard-like{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;transition:background .15s}
    .pcard-like:hover{background:white}

    /* quick-select overlay on hover */
    .pcard-quick{position:absolute;bottom:0;left:0;right:0;background:rgba(249,246,239,.97);padding:14px 14px 16px;transform:translateY(100%);transition:transform .25s ease;border-radius:0 0 10px 10px}
    .pcard:hover .pcard-quick{transform:translateY(0)}
    .pcard-quick-colors{display:flex;gap:6px;margin-bottom:10px;align-items:center}
    .pcard-quick-sizes{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
    .qsize{height:30px;padding:0 9px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid var(--mid);background:white;color:var(--dark-mid);cursor:pointer;transition:all .15s;display:flex;align-items:center}
    .qsize:hover,.qsize.sel{border-color:var(--dark);background:var(--dark);color:white}
    .qsize.esgotado{opacity:.4;text-decoration:line-through;cursor:not-allowed}
    .qbuy{width:100%;padding:11px;background:var(--dark);color:var(--cream);border-radius:8px;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;font-family:var(--fb);transition:background .2s}
    .qbuy:hover{background:var(--taupe-dark)}
    .qbuy.added{background:var(--success)}

    .pcard-info{padding:12px 4px 0}
    .pcard-name{font-size:14px;color:var(--dark);font-weight:400;margin-bottom:5px;line-height:1.3}
    .pcard-prices{display:flex;align-items:baseline;gap:8px}
    .pcard-price{font-family:var(--fd);font-size:16px;font-weight:600;color:var(--dark)}
    .pcard-old{font-size:12px;color:#999;text-decoration:line-through}
    .pcard-discount-pct{font-size:11px;color:#e74c3c;font-weight:600}

    /* ── QUIZ BANNER ── */
    .quiz-banner{background:var(--cream);margin:0 24px 60px;max-width:1280px;margin-left:auto;margin-right:auto;border-radius:16px;padding:56px 64px;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
    .quiz-cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    /* ── TESTIMONIALS ── */
    .testi-section{background:var(--bg);padding:60px 24px}
    .testi-grid{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:32px}

    /* ── NEWSLETTER ── */
    .newsletter{background:var(--dark);padding:56px 24px;text-align:center}

    /* ── FOOTER ── */
    footer{background:#111;color:rgba(255,255,255,.6);padding:48px 24px 24px}
    .footer-inner{max-width:1280px;margin:0 auto}
    .footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;margin-bottom:40px}
    .footer-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:16px;font-weight:600}
    .footer-link{display:block;font-size:13px;color:rgba(255,255,255,.5);margin-bottom:10px;cursor:pointer;transition:color .2s}
    .footer-link:hover{color:rgba(255,255,255,.85)}
    .footer-brand{font-family:var(--fd);font-size:24px;color:white;margin-bottom:14px}
    .footer-desc{font-size:13px;color:rgba(255,255,255,.45);line-height:1.8;max-width:240px;margin-bottom:20px}
    .payment-icons{display:flex;flex-wrap:wrap;gap:8px;margin-top:32px}
    .payment-icon{height:24px;padding:3px 8px;background:rgba(255,255,255,.1);border-radius:4px;font-size:10px;font-weight:600;color:rgba(255,255,255,.6);display:flex;align-items:center}
    .footer-bottom{border-top:1px solid rgba(255,255,255,.07);padding-top:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;font-size:12px;color:rgba(255,255,255,.3)}

    /* ── CART ── */
    .cart-overlay{position:fixed;inset:0;z-index:400;display:flex}
    .cart-bg{flex:1;background:rgba(0,0,0,.4);cursor:pointer}
    .cart-panel{width:400px;max-width:100vw;background:white;height:100%;display:flex;flex-direction:column;animation:slideR .3s ease}
    .cart-head{padding:20px 22px;border-bottom:1px solid #f0ede8;display:flex;justify-content:space-between;align-items:center}
    .cart-items{flex:1;overflow-y:auto;padding:16px 22px}
    .cart-foot{padding:18px 22px;border-top:1px solid #f0ede8}

    /* ── MODAL LOGIN ── */
    .modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center}
    .modal-box{background:white;border-radius:20px 20px 0 0;width:100%;max-width:440px;padding:36px 28px;animation:fadeUp .3s ease}

    /* ── PRODUCT PAGE MODAL ── */
    .prod-modal-overlay{position:fixed;inset:0;z-index:450;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center}
    .prod-modal{background:white;border-radius:20px 20px 0 0;width:100%;max-width:900px;max-height:92vh;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;animation:fadeUp .35s ease}
    .prod-modal-img{overflow:hidden;min-height:300px}
    .prod-modal-info{padding:28px 24px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}

    /* ── MISC ── */
    .btn-dark{display:inline-flex;align-items:center;gap:9px;padding:14px 28px;background:var(--dark);color:var(--cream);border-radius:8px;font-size:13px;font-weight:600;letter-spacing:.8px;cursor:pointer;font-family:var(--fb);border:none;transition:opacity .2s}
    .btn-dark:hover{opacity:.85}
    .btn-outline{display:inline-flex;align-items:center;gap:9px;padding:13px 28px;background:transparent;color:var(--dark);border:1.5px solid var(--mid);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fb);transition:all .2s}
    .btn-outline:hover{border-color:var(--dark);background:var(--cream-light)}
    .btn-wa{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:#25D366;color:white;border-radius:8px;font-size:13px;font-weight:600;width:100%;cursor:pointer;border:none;font-family:var(--fb)}
    .wa-float{position:fixed;bottom:22px;left:22px;z-index:90;width:52px;height:52px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,.4);transition:transform .2s;text-decoration:none}
    .wa-float:hover{transform:scale(1.08)}
    .inp{width:100%;padding:12px 14px;border:1px solid var(--mid);border-radius:8px;font-size:14px;color:var(--dark);background:white;outline:none;font-family:var(--fb)}
    .inp:focus{border-color:var(--taupe)}
    .lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--taupe);display:block;margin-bottom:6px;font-weight:500}

    /* ── RESPONSIVE ── */
    @media(max-width:1024px){
      .prod-grid{grid-template-columns:repeat(3,1fr)}
      .cat-grid{grid-template-columns:repeat(2,1fr)}
      .footer-grid{grid-template-columns:1fr 1fr;gap:28px}
    }
    @media(max-width:768px){
      .nav-links{display:none}
      .nav-burger{display:flex}
      .hero-slide-inner{grid-template-columns:1fr;min-height:auto}
      .hero-img-col{display:none}
      .hero-text{padding:60px 20px 44px}
      .cat-grid{grid-template-columns:1fr 1fr;gap:8px;margin:24px auto;padding:0 16px}
      .prod-grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px 48px}
      .sec-head{padding:28px 16px 16px}
      .quiz-banner{grid-template-columns:1fr;padding:28px 20px;margin:0 12px 40px;border-radius:14px}
      .testi-grid{grid-template-columns:1fr}
      .footer-grid{grid-template-columns:1fr 1fr}
      .cart-panel{width:100vw;border-radius:20px 20px 0 0;max-height:92vh}
      .prod-modal{grid-template-columns:1fr;max-height:95vh;border-radius:20px 20px 0 0}
      .prod-modal-img{height:260px;min-height:unset}
      .pcard-quick{display:none}
      .hero-arrow{display:none}
    }
    @media(max-width:480px){
      .prod-grid{gap:8px}
      .cat-grid{gap:6px}
    }
    @media(min-width:769px){
      .prod-modal-overlay{align-items:center}
      .prod-modal{border-radius:16px;max-height:88vh}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── CONFIG ── */

function getRecs(ans){
  return PRODUCTS.filter(p=>{
    let sc=0;
    if(ans.profession&&p.professions?.includes(ans.profession))sc+=3;
    if(ans.environment&&p.environments?.includes(ans.environment))sc+=2;
    if(ans.fit&&p.fits?.includes(ans.fit))sc+=2;
    if(ans.budget==="economico"&&p.price<=200)sc+=2;
    if(ans.budget==="medio"&&p.price>200&&p.price<=350)sc+=2;
    if(ans.budget==="premium"&&p.price>350)sc+=2;
    return sc>=2;
  }).sort((a,b)=>b.price-a.price).slice(0,4);
}

/* ── HELPERS ── */
const R = p=>`R$ ${Number(p).toFixed(2).replace(".",",")}`;
const pct = (old,cur)=>old?Math.round((1-cur/old)*100):0;
function getColorName(p,hex){return(p.colorNames&&p.colorNames[hex])||hex}
function getColorImages(p,hex){
  if(p.colorImages&&p.colorImages[hex]?.length)return p.colorImages[hex];
  if(p.image)return[p.image];return[];
}

/* ── CAROUSEL COMPONENT ── */
const Carousel = ({images,height="100%"})=>{
  const [idx,setIdx]=useState(0);
  const dragStart=useRef(null);
  if(!images?.length)return(
    <div style={{width:"100%",height,background:"linear-gradient(145deg,#ebe2c5,#b79b8544)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <span style={{fontSize:40,opacity:.3}}>👗</span>
    </div>
  );
  const prev=()=>setIdx(i=>Math.max(0,i-1));
  const next=()=>setIdx(i=>Math.min(images.length-1,i+1));
  return(
    <div style={{position:"relative",width:"100%",height,overflow:"hidden",userSelect:"none"}}
      onTouchStart={e=>dragStart.current=e.touches[0].clientX}
      onTouchEnd={e=>{const diff=dragStart.current-e.changedTouches[0].clientX;if(diff>40)next();else if(diff<-40)prev();dragStart.current=null}}>
      <div style={{display:"flex",height:"100%",transform:`translateX(-${idx*100}%)`,transition:"transform .4s ease"}}>
        {images.map((src,i)=>(
          <div key={i} style={{minWidth:"100%",height:"100%"}}>
            <img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
          </div>
        ))}
      </div>
      {images.length>1&&(
        <>
          {idx>0&&<button className="hero-arrow" onClick={prev} style={{left:10}}><Ic n="arrL" s={18} c="var(--dark)"/></button>}
          {idx<images.length-1&&<button className="hero-arrow" onClick={next} style={{right:10}}><Ic n="arr" s={18} c="var(--dark)"/></button>}
          <div style={{position:"absolute",bottom:10,left:0,right:0,display:"flex",justifyContent:"center",gap:5}}>
            {images.map((_,i)=>(
              <button key={i} onClick={()=>setIdx(i)} style={{width:i===idx?18:6,height:6,borderRadius:3,background:i===idx?"white":"rgba(255,255,255,.55)",border:"none",cursor:"pointer",padding:0,transition:"width .2s"}}/>
            ))}
          </div>
        </>
      )}
    </div>
  );
};

/* ── PRODUCT CARD with quick-select ── */
const PCard = ({product,onAdd,onClick})=>{
  const [ci,setCi]=useState(0);
  const [sz,setSz]=useState("M");
  const [liked,setLiked]=useState(false);
  const [added,setAdded]=useState(false);
  const colorHex=product.colors?.[ci]||"";
  const colorName=getColorName(product,colorHex);
  const imgs=getColorImages(product,colorHex);
  const disc=pct(product.oldPrice,product.price);

  const doAdd=e=>{
    e.stopPropagation();
    onAdd({...product,size:sz,colorHex,colorName,qty:1});
    setAdded(true);
    setTimeout(()=>setAdded(false),1500);
  };

  return(
    <div className="pcard">
      <div className="pcard-img" onClick={onClick}>
        {imgs.length
          ?<img src={imgs[0]} alt={product.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          :<div style={{width:"100%",height:"100%",background:`linear-gradient(145deg,${colorHex||"#ebe2c5"},${product.colors?.[1]||"#b79b85"}55)`,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:36,opacity:.3}}>👗</span></div>
        }
        {disc>0&&<span className="pcard-discount">{disc}% OFF</span>}
        {product.tag&&!disc&&<span className="pcard-badge">{product.tag}</span>}
        <button className="pcard-like" onClick={e=>{e.stopPropagation();setLiked(l=>!l);}}>
          <Ic n={liked?"heartF":"heart"} s={16} c={liked?"var(--taupe)":"var(--dark-mid)"}/>
        </button>

        {/* Quick-select hover panel */}
        <div className="pcard-quick" onClick={e=>e.stopPropagation()}>
          {product.colors?.length>1&&(
            <div className="pcard-quick-colors">
              <span style={{fontSize:11,color:"var(--taupe)",marginRight:4}}>{colorName}</span>
              {product.colors.map((c,i)=>(
                <button key={i} onClick={()=>setCi(i)} style={{width:18,height:18,borderRadius:"50%",background:c,border:ci===i?"2px solid var(--dark)":"2px solid transparent",outline:ci===i?"2px solid var(--cream)":"none",outlineOffset:1,cursor:"pointer",flexShrink:0}} title={getColorName(product,c)}/>
              ))}
            </div>
          )}
          <div className="pcard-quick-sizes">
            {SIZES.map(s=>(
              <button key={s} className={`qsize${sz===s?" sel":""}`} onClick={()=>setSz(s)}>{s}</button>
            ))}
          </div>
          <button className={`qbuy${added?" added":""}`} onClick={doAdd}>
            {added?"✓ Adicionado!":"Comprar"}
          </button>
        </div>
      </div>
      <div className="pcard-info">
        <p className="pcard-name">{product.name}</p>
        <div className="pcard-prices">
          <span className="pcard-price">{R(product.price)}</span>
          {product.oldPrice&&<span className="pcard-old">{R(product.oldPrice)}</span>}
          {disc>0&&<span className="pcard-discount-pct">-{disc}%</span>}
        </div>
        <p style={{fontSize:11,color:"var(--success)",marginTop:3,fontWeight:500}}>✓ Frete para todo o Brasil</p>
      </div>
    </div>
  );
};

const ProdModal = ({product,onClose,onAdd})=>{

const CartDrawer = ({cart,setCart,onClose,setPage})=>{
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const rm=id=>setCart(c=>c.filter(i=>i.id!==id));
  const wa=()=>{
    const items=cart.map(i=>{
      const cor=i.colorName?` | Cor: ${i.colorName}`:"";
      const tam=i.size?` | Tam: ${i.size}`:"";
      return`• ${i.name}${cor}${tam} (x${i.qty}) — ${R(i.price*i.qty)}`;
    }).join("\n");
    window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(`Olá! Quero comprar:\n\n${items}\n\n*Total: ${R(total)}*\n\nPoderia me ajudar?`)}`,"_blank");

      <div style={{maxWidth:560,textAlign:"center"}}>
        <div style={{width:72,height:72,borderRadius:"50%",background:"var(--cream)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 24px",fontSize:30}}>✨</div>
        <p style={{fontSize:11,letterSpacing:3,textTransform:"uppercase",color:"var(--taupe)",marginBottom:12,fontWeight:500}}>Quiz Personalizado</p>
        <h1 style={{fontFamily:"var(--fd)",fontSize:"clamp(26px,5vw,46px)",color:"var(--dark)",fontWeight:400,marginBottom:18,lineHeight:1.15}}>Encontre o uniforme<br/><em>perfeito para você</em></h1>
        <p style={{fontSize:15,color:"var(--dark-mid)",lineHeight:1.8,marginBottom:32}}>Em 8 perguntas, vamos conhecer sua profissão, rotina e estilo para recomendar as peças ideais da Vit Clin.</p>
        <button className="btn-dark" onClick={()=>setStep(0)} style={{margin:"0 auto"}}>Começar o quiz <Ic n="arr" s={15} c="var(--cream)"/></button>
        <p style={{marginTop:14,fontSize:12,color:"var(--taupe)"}}>⏱ Menos de 2 minutos</p>
      </div>
    </div>
  );

  if(results)return(
    <div style={{minHeight:"100vh",paddingTop:60,background:"var(--bg)"}}>
      <div style={{maxWidth:1200,margin:"0 auto",padding:"32px 24px"}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{width:56,height:56,borderRadius:"50%",background:"var(--success)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}><Ic n="ok" s={28} c="white"/></div>
          <h1 style={{fontFamily:"var(--fd)",fontSize:"clamp(22px,4vw,36px)",color:"var(--dark)",fontWeight:400}}>As peças ideais <em>para você</em></h1>
          {results.length>0&&<p style={{fontSize:13,color:"var(--taupe)",marginTop:8}}>{results.length} peças selecionadas especialmente para você</p>}
        </div>
        {results.length===0
          ?<div style={{textAlign:"center",padding:32}}><p style={{fontFamily:"var(--fd)",fontSize:18,marginBottom:20}}>Temos opções perfeitas!</p><button className="btn-dark" onClick={()=>setPage("loja")} style={{margin:"0 auto"}}>Ver toda a coleção</button></div>
          :<div className="prod-grid">{results.map(p=><PCard key={p.id} product={p} onAdd={onAdd} onClick={()=>setSel(p)}/>)}</div>
        }
        <div style={{textAlign:"center",marginTop:24,display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
          <button className="btn-outline" onClick={restart}>Refazer quiz</button>
          <button className="btn-dark" onClick={()=>setPage("loja")}>Ver toda a coleção</button>
        </div>
      </div>
      {sel&&<ProdModal product={sel} onClose={()=>setSel(null)} onAdd={onAdd}/>}
    </div>
  );

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"80px 16px 60px",background:"var(--bg)"}}>
      <div style={{width:"100%",maxWidth:520,marginBottom:32}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontSize:12,color:"var(--taupe)",fontWeight:500}}>Pergunta {step+1} de {total}</span>
          <span style={{fontSize:12,color:"var(--taupe)"}}>{Math.round(((step+1)/total)*100)}%</span>
        </div>
        <div style={{height:3,background:"var(--cream)",borderRadius:2,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${((step+1)/total)*100}%`,background:"var(--taupe-dark)",transition:"width .4s ease"}}/>
        </div>
      </div>
      <div style={{width:"100%",maxWidth:520,animation:"fadeUp .3s ease"}} key={step}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <span style={{fontSize:36,display:"block",marginBottom:14}}>{cur.icon}</span>
          <h2 style={{fontFamily:"var(--fd)",fontSize:"clamp(18px,4vw,26px)",color:"var(--dark)",fontWeight:400}}>{cur.q}</h2>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {cur.opts.map(opt=>(
            <button key={opt.v} onClick={()=>pick(opt.v)} style={{padding:"15px 20px",border:"1.5px solid var(--mid)",borderRadius:10,fontSize:14,color:"var(--dark)",textAlign:"left",background:"white",transition:"all .15s",display:"flex",alignItems:"center",gap:12,cursor:"pointer",fontFamily:"var(--fb)"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--taupe)";e.currentTarget.style.background="var(--cream-light)"}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--mid)";e.currentTarget.style.background="white"}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:"var(--mid)",flexShrink:0}}/>
              {opt.l}
            </button>
          ))}
        </div>
        {step>0&&<button onClick={()=>setStep(s=>s-1)} style={{marginTop:20,display:"flex",alignItems:"center",gap:7,color:"var(--taupe)",fontSize:13,background:"none",cursor:"pointer"}}><Ic n="arrL" s={14} c="var(--taupe)"/> Voltar</button>}
      </div>
    </div>
  );
};

// CONTATO
const Contato = ()=>{
  const [form,setForm]=useState({name:"",email:"",msg:""});
  const [sent,setSent]=useState(false);
  return(
    <div style={{minHeight:"100vh"}}>
      <div style={{maxWidth:1000,margin:"0 auto",display:"grid",gridTemplateColumns:"1fr 1fr",gap:56,padding:"60px 24px 80px",alignItems:"start"}}>
        <div>
          <p style={{fontSize:11,letterSpacing:3,textTransform:"uppercase",color:"var(--taupe)",marginBottom:14,fontWeight:500}}>Fale conosco</p>
          <h1 style={{fontFamily:"var(--fd)",fontSize:"clamp(26px,4vw,42px)",color:"var(--dark)",fontWeight:400,marginBottom:20,lineHeight:1.1}}>Como podemos<br/><em>ajudar você?</em></h1>
          <p style={{fontSize:15,color:"var(--dark-mid)",lineHeight:1.8,marginBottom:36}}>Nossa equipe está pronta para te atender.</p>
          <div style={{background:"var(--cream)",borderRadius:14,padding:"22px",marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
              <div style={{width:44,height:44,borderRadius:"50%",background:"#25D366",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="wa" s={20} c="white"/></div>
              <div><p style={{fontFamily:"var(--fd)",fontSize:14,fontWeight:600}}>WhatsApp</p><p style={{fontSize:12,color:"var(--taupe)"}}>Seg–Sáb, 8h–18h</p></div>
            </div>
            <button className="btn-wa" onClick={()=>window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent("Olá! Gostaria de saber mais sobre os uniformes Vit Clin.")}` ,"_blank")}><Ic n="wa" s={15} c="white"/> Iniciar conversa</button>
          </div>
          {[["📧","contato@vitclin.com.br"],["📍","Brasil — Entrega nacional"],["📱","@vitclin.uniformes"]].map(([ic,txt])=>(
            <div key={txt} style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}><span>{ic}</span><span style={{fontSize:14,color:"var(--dark-mid)"}}>{txt}</span></div>
          ))}
        </div>
        <div style={{background:"white",borderRadius:16,padding:"28px",border:"1px solid #f0ede8"}}>
          {sent?(
            <div style={{textAlign:"center",padding:"32px 0"}}>
              <div style={{width:52,height:52,borderRadius:"50%",background:"var(--success)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}><Ic n="ok" s={26} c="white"/></div>
              <p style={{fontFamily:"var(--fd)",fontSize:17}}>Mensagem enviada!</p>
            </div>
          ):(
            <>
              <h3 style={{fontFamily:"var(--fd)",fontSize:19,marginBottom:20}}>Envie uma mensagem</h3>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div><label className="lbl">Nome</label><input className="inp" placeholder="Seu nome" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
                <div><label className="lbl">E-mail</label><input type="email" className="inp" placeholder="seu@email.com" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/></div>
                <div><label className="lbl">Mensagem</label><textarea className="inp" rows={4} placeholder="Como podemos ajudar?" value={form.msg} onChange={e=>setForm(f=>({...f,msg:e.target.value}))} style={{resize:"vertical"}}/></div>
                <button className="btn-dark" style={{width:"100%",justifyContent:"center"}} onClick={()=>setSent(true)}>Enviar mensagem</button>
                <button className="btn-wa" onClick={()=>{const m=`Olá! ${form.name?`Sou ${form.name}. `:""}${form.msg}`;window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(m)}`,"_blank")}}><Ic n="wa" s={15} c="white"/> Continuar pelo WhatsApp</button>
              </div>
            </>
          )}
        </div>
        <style>{`@media(max-width:640px){.contato-inner{grid-template-columns:1fr!important}}`}</style>
      </div>
      <Footer/>
    </div>
  );
};

// CLIENTE
const Cliente = ({user,setUser,setPage})=>{
  const [tab,setTab]=useState("pedidos");
  return(
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <div style={{maxWidth:900,margin:"0 auto",padding:"48px 24px 72px"}}>
        <div style={{background:"var(--cream)",borderRadius:16,padding:"24px 28px",marginBottom:28,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
          <div>
            <p style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"var(--taupe)",marginBottom:4}}>Área exclusiva</p>
            <h1 style={{fontFamily:"var(--fd)",fontSize:"clamp(20px,4vw,28px)",fontWeight:400}}>Olá, <em>{user?.name}</em> ✦</h1>
          </div>
          <button onClick={()=>{setUser(null);setPage("home")}} style={{fontSize:13,color:"var(--taupe-dark)",textDecoration:"underline",background:"none",cursor:"pointer"}}>Sair</button>
        </div>
        <div style={{display:"flex",gap:0,borderBottom:"1px solid #f0ede8",marginBottom:24,overflowX:"auto"}}>
          {[["pedidos","Meus Pedidos"],["perfil","Meu Perfil"],["favoritos","Favoritos"]].map(([id,lbl])=>(
            <button key={id} onClick={()=>setTab(id)} style={{padding:"11px 20px",fontSize:13,fontWeight:500,color:tab===id?"var(--dark)":"var(--taupe)",borderBottom:tab===id?"2px solid var(--dark)":"2px solid transparent",marginBottom:-1,background:"none",whiteSpace:"nowrap",cursor:"pointer",transition:"all .2s"}}>{lbl}</button>
          ))}
        </div>
        {tab==="pedidos"&&<div style={{background:"white",borderRadius:14,padding:"40px",border:"1px solid #f0ede8",textAlign:"center"}}><span style={{fontSize:40}}>📦</span><p style={{fontFamily:"var(--fd)",fontSize:17,marginTop:14}}>Nenhum pedido ainda</p><button className="btn-dark" onClick={()=>setPage("loja")} style={{margin:"20px auto 0"}}>Explorar a loja</button></div>}
        {tab==="perfil"&&<div style={{background:"white",borderRadius:14,padding:"28px",border:"1px solid #f0ede8",maxWidth:440}}>{[["Nome",user?.name],["E-mail",user?.email],["Telefone","—"]].map(([l,v])=><div key={l} style={{display:"flex",justifyContent:"space-between",paddingBottom:14,borderBottom:"1px solid #f5f0e8",marginBottom:14}}><span style={{fontSize:13,color:"var(--taupe)"}}>{l}</span><span style={{fontSize:13}}>{v||"—"}</span></div>)}</div>}
        {tab==="favoritos"&&<div style={{background:"white",borderRadius:14,padding:"40px",border:"1px solid #f0ede8",textAlign:"center"}}><Ic n="heart" s={40} c="var(--mid)"/><p style={{fontFamily:"var(--fd)",fontSize:17,marginTop:14}}>Sem favoritos ainda</p></div>}
      </div>
      <Footer setPage={setPage}/>
    </div>
  );
};

/* ── TWEAKS PANEL ── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"primaryColor":"#1a1410","accentColor":"#b79b85","bgColor":"#f9f6ef","creamColor":"#ebe2c5"}/*EDITMODE-END*/;
const TweaksPanel = ({visible,onHide})=>{
  const [v,setV]=useState(()=>{try{return JSON.parse(localStorage.getItem("vitclin_tweaks"))||TWEAK_DEFAULTS}catch{return TWEAK_DEFAULTS}});
  const up=(k,val)=>{const n={...v,[k]:val};setV(n);localStorage.setItem("vitclin_tweaks",JSON.stringify(n));document.documentElement.style.setProperty("--dark",n.primaryColor);document.documentElement.style.setProperty("--taupe",n.accentColor);document.documentElement.style.setProperty("--bg",n.bgColor);document.documentElement.style.setProperty("--cream",n.creamColor);window.parent.postMessage({type:"__edit_mode_set_keys",edits:n},"*")};
  useEffect(()=>{document.documentElement.style.setProperty("--dark",v.primaryColor);document.documentElement.style.setProperty("--taupe",v.accentColor);document.documentElement.style.setProperty("--bg",v.bgColor);document.documentElement.style.setProperty("--cream",v.creamColor)},[]);
  if(!visible)return null;
  return(
    <div style={{position:"fixed",bottom:20,right:20,zIndex:999,background:"white",borderRadius:14,border:"1px solid var(--mid)",boxShadow:"0 20px 60px rgba(0,0,0,.15)",padding:"20px",width:256}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={{fontFamily:"var(--fd)",fontSize:14,color:"var(--dark)"}}>Tweaks</span>
        <button onClick={onHide}><Ic n="x" s={15} c="var(--taupe)"/></button>
      </div>
      {[["primaryColor","Cor principal"],["accentColor","Destaque"],["bgColor","Fundo"],["creamColor","Creme"]].map(([k,lbl])=>(
        <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{fontSize:13,color:"var(--dark-mid)"}}>{lbl}</span>
          <input type="color" value={v[k]} onChange={e=>up(k,e.target.value)} style={{width:32,height:24,borderRadius:5,border:"1px solid var(--mid)",cursor:"pointer",padding:0}}/>
        </div>
      ))}
    </div>
  );
};

/* ── APP ── */
const App = ()=>{
  const [page,setPage]=useState(()=>localStorage.getItem("vitclin_page")||"home");
  const [cart,setCart]=useState([]);
  const [showCart,setShowCart]=useState(false);
  const [showLogin,setShowLogin]=useState(false);
  const [user,setUser]=useState(null);
  const [tweaks,setTweaks]=useState(false);

  useEffect(()=>{localStorage.setItem("vitclin_page",page);window.scrollTo(0,0)},[page]);
  useEffect(()=>{
    const fn=e=>{if(e.data?.type==="__activate_edit_mode")setTweaks(true);if(e.data?.type==="__deactivate_edit_mode")setTweaks(false)};
    window.addEventListener("message",fn);
    window.parent.postMessage({type:"__edit_mode_available"},"*");
    return()=>window.removeEventListener("message",fn);
  },[]);

  const addCart=p=>setCart(prev=>{
    const ex=prev.find(i=>i.id===p.id&&i.size===p.size&&i.colorHex===p.colorHex);
    if(ex)return prev.map(i=>i.id===p.id&&i.size===p.size&&i.colorHex===p.colorHex?{...i,qty:i.qty+1}:i);
    return[...prev,p];
  });
  const cartCount=cart.reduce((s,i)=>s+i.qty,0);

  const newin=PRODUCTS.slice().sort(()=>Math.random()-.5).slice(0,8);
  const bestsellers=PRODUCTS.slice().sort((a,b)=>a.price-b.price);

  return(
    <>
      <AnnBar/>
      <Nav page={page} setPage={setPage} cartCount={cartCount} user={user} setShowLogin={setShowLogin} setShowCart={setShowCart}/>
      {page==="home"&&<Home setPage={setPage} onAdd={addCart}/>}
      {page==="loja"&&<Loja onAdd={addCart}/>}
      {page==="newin"&&<ProductListPage title="New In" products={newin} onAdd={addCart}/>}
      {page==="bestsellers"&&<ProductListPage title="Best Sellers" products={bestsellers} onAdd={addCart}/>}
      {page==="quiz"&&<Quiz onAdd={addCart} setPage={setPage}/>}
      {page==="contato"&&<Contato/>}
      {page==="cliente"&&user&&<Cliente user={user} setUser={setUser} setPage={setPage}/>}
      {page==="cliente"&&!user&&<Home setPage={setPage} onAdd={addCart}/>}
      {showCart&&<CartDrawer cart={cart} setCart={setCart} onClose={()=>setShowCart(false)} setPage={setPage}/>}
      {showLogin&&<LoginModal onClose={()=>setShowLogin(false)} setUser={u=>{setUser(u);setPage("cliente");setShowLogin(false)}}/>}
      <a href={`https://wa.me/${WHATSAPP}?text=${encodeURIComponent("Olá! Gostaria de saber mais sobre os uniformes Vit Clin.")}`} target="_blank" rel="noopener" className="wa-float">
        <Ic n="wa" s={26} c="white"/>
      </a>
      <TweaksPanel visible={tweaks} onHide={()=>setTweaks(false)}/>
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
