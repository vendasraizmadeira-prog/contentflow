<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vit Clin — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #ebe2c5; --taupe: #b79b85; --taupe-dark: #8a7060;
      --dark: #1a1410; --bg: #f9f6ef; --white: #fff; --mid: #d4c4b0;
      --cream-light: #f5f0e4; --success: #4a7c59; --danger: #c0392b;
      --sidebar: #1a1410; --font-d: 'Playfair Display',serif; --font-b: 'DM Sans',sans-serif;
    }
    body { font-family: var(--font-b); background: var(--bg); color: var(--dark); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    *, button, input, select, textarea { font-family: var(--font-b); }
    button { cursor: pointer; border: none; background: none; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: var(--mid); border-radius: 2px; }

    @keyframes fadeUp   { from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)} }
    @keyframes slideUp  { from{transform:translateY(100%)}to{transform:translateY(0)} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    .fade-up { animation: fadeUp .35s ease; }

    /* ── LAYOUT ── */
    .admin-layout  { display: flex; min-height: 100vh; }
    .sidebar       { width: 220px; background: var(--sidebar); flex-shrink: 0; display: flex; flex-direction: column;
                     position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .main-content  { flex: 1; overflow-y: auto; min-width: 0; padding: 36px 32px; }

    /* ── BOTTOM NAV (mobile) ── */
    .bottom-nav    { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
                     background: var(--sidebar); border-top: 1px solid rgba(255,255,255,.08);
                     padding: 8px 0 max(8px, env(safe-area-inset-bottom)); }
    .bottom-nav-inner { display: flex; justify-content: space-around; align-items: center; }
    .bottom-nav-btn   { display: flex; flex-direction: column; align-items: center; gap: 3px;
                        padding: 6px 16px; color: rgba(235,226,197,.45); font-size: 10px;
                        font-weight: 500; letter-spacing: .5px; text-transform: uppercase; background: none; }
    .bottom-nav-btn.active { color: var(--cream); }

    /* ── TOP BAR (mobile) ── */
    .top-bar       { display: none; position: sticky; top: 0; z-index: 50; background: var(--sidebar);
                     padding: 14px 20px; align-items: center; justify-content: space-between; }

    /* ── STAT CARDS ── */
    .stats-grid    { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card     { background: var(--white); border-radius: 14px; padding: 20px; border: 1px solid var(--cream);
                     display: flex; align-items: center; gap: 14px; }

    /* ── PRODUCTS TABLE ── */
    .prod-table    { width: 100%; border-collapse: collapse; }
    .prod-table th { padding: 11px 16px; text-align: left; font-size: 10px; letter-spacing: 1.5px;
                     text-transform: uppercase; color: var(--taupe); font-weight: 600; background: var(--cream-light);
                     white-space: nowrap; }
    .prod-table td { padding: 13px 16px; border-bottom: 1px solid var(--cream-light); vertical-align: middle; }
    .prod-table tr:hover td { background: var(--cream-light); }

    /* ── PRODUCT CARDS (mobile view) ── */
    .prod-cards    { display: none; flex-direction: column; gap: 12px; }
    .prod-card     { background: var(--white); border-radius: 14px; padding: 16px; border: 1px solid var(--cream); }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(26,20,16,.55);
                     backdrop-filter: blur(4px); display: flex; align-items: flex-end; justify-content: center; }
    .modal-box     { background: var(--bg); border-radius: 20px 20px 0 0; width: 100%; max-height: 95vh;
                     overflow-y: auto; animation: slideUp .35s ease; }
    .modal-box.desktop { border-radius: 20px; width: 680px; max-width: calc(100vw - 32px); margin: auto; animation: fadeUp .3s ease; }

    /* ── INPUTS ── */
    .inp { width: 100%; padding: 12px 14px; border: 1px solid var(--mid); border-radius: 10px;
           font-size: 14px; color: var(--dark); background: var(--white); outline: none; }
    .inp:focus { border-color: var(--taupe); }
    .lbl { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--taupe);
           display: block; margin-bottom: 6px; font-weight: 500; }

    /* ── BUTTONS ── */
    .btn-dark  { display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px;
                 background: var(--dark); color: var(--cream); border-radius: 10px; font-size: 13px;
                 font-weight: 600; letter-spacing: .8px; cursor: pointer; }
    .btn-out   { display: inline-flex; align-items: center; gap: 8px; padding: 11px 18px;
                 background: transparent; color: var(--taupe-dark); border: 1.5px solid var(--mid);
                 border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .badge     { display: inline-flex; padding: 3px 10px; border-radius: 20px; font-size: 10px;
                 font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

    /* ── TOGGLE ── */
    .toggle     { width: 42px; height: 24px; border-radius: 12px; position: relative; cursor: pointer;
                  transition: background .2s; flex-shrink: 0; }
    .toggle-dot { width: 18px; height: 18px; border-radius: 50%; background: white; position: absolute;
                  top: 3px; transition: left .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar         { display: none !important; width: 0 !important; min-width: 0 !important; }
      .bottom-nav      { display: block !important; }
      .top-bar         { display: flex !important; }
      .main-content    { padding: 16px 14px 96px !important; }
      .admin-layout    { flex-direction: column !important; }
      .stats-grid      { grid-template-columns: repeat(2,1fr) !important; gap: 10px !important; }
      .stat-card       { padding: 14px !important; gap: 10px !important; }
      .prod-table-wrap { display: none !important; }
      .prod-cards      { display: flex !important; }
      .modal-box.desktop { border-radius: 20px 20px 0 0 !important; width: 100% !important; max-width: 100% !important; margin: 0 !important; }
      .form-grid       { grid-template-columns: 1fr !important; }
      .form-img-grid   { grid-template-columns: 1fr !important; }
      .modal-overlay   { align-items: flex-end !important; }
    }
    @media (min-width: 769px) {
      .modal-overlay   { align-items: center; }
      .top-bar         { display: none !important; }
      .bottom-nav      { display: none !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const ADMIN_PW = "vitclin2026";

/* ── MOBILE HOOK ── */
function useMobile() {
  const [mobile, setMobile] = useState(() => window.innerWidth <= 768);
  useEffect(() => {
    const fn = () => setMobile(window.innerWidth <= 768);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return mobile;
}

const DEFAULT_PRODUCTS = [
  { id:1, name:"Conjunto Clínico Premium", category:"conjunto", price:379, oldPrice:449, colors:["#f0d5c8","#c8d5e8","#2d4a3e"], image:"assets/product1.jpg", tag:"Mais Vendido", active:true, desc:"Conjunto completo em tecido premium com modelagem slim." },
  { id:2, name:"Scrub Cirúrgico Slim", category:"scrub", price:189, oldPrice:null, colors:["#6b8cae","#2d6a4f","#374151"], image:null, tag:null, active:true, desc:"Scrub profissional com tecido antifluido e secagem rápida." },
  { id:3, name:"Jaleco Elegance", category:"jaleco", price:249, oldPrice:299, colors:["#ffffff","#ebe2c5","#f0d5c8"], image:null, tag:"Novo", active:true, desc:"Jaleco feminino com corte moderno, gola diferenciada." },
  { id:4, name:"Scrub Set Luxe", category:"conjunto", price:459, oldPrice:539, colors:["#b79b85","#1a1410","#4a5568"], image:null, tag:"Premium", active:true, desc:"Set completo de scrub com tecido de alta qualidade." },
  { id:5, name:"Jaleco Bordado Premium", category:"jaleco", price:289, oldPrice:null, colors:["#ffffff","#e8f0d5"], image:null, tag:null, active:true, desc:"Jaleco com bordado personalizado, bolsos amplos." },
  { id:6, name:"Uniforme Recepção", category:"uniforme", price:329, oldPrice:389, colors:["#f0d5c8","#dde8f0","#ebe2c5"], image:null, tag:"Oferta", active:false, desc:"Uniforme elegante para recepcionistas." },
];
const DEFAULT_SETTINGS = { whatsapp:"5511999999999", storeName:"Vit Clin", instagram:"@vitclin.uniformes", email:"contato@vitclin.com.br", adminPassword:"vitclin2026" };

function loadProds()   { try{ const s=localStorage.getItem("vitclin_products"); return s?JSON.parse(s):DEFAULT_PRODUCTS; }catch{ return DEFAULT_PRODUCTS; } }
function saveProds(p)  { localStorage.setItem("vitclin_products",JSON.stringify(p)); }
function loadSettings(){ try{ const s=localStorage.getItem("vitclin_settings"); return s?{...DEFAULT_SETTINGS,...JSON.parse(s)}:DEFAULT_SETTINGS; }catch{ return DEFAULT_SETTINGS; } }
function saveSettings(s){ localStorage.setItem("vitclin_settings",JSON.stringify(s)); }

/* ── ICONS ── */
const Ic = ({n,s=18,c="currentColor"}) => {
  const d = {
    home:   <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.6"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    box:    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.6"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>,
    cog:    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.6"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/><path d="M12 2v2m0 16v2M2 12h2m16 0h2"/></svg>,
    edit:   <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.6"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
    trash:  <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.6"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6m4-6v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>,
    plus:   <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    x:      <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    ok:     <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.4"><polyline points="20 6 9 17 4 12"/></svg>,
    eye:    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.6"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
    img:    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
    upload: <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.6"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>,
    logout: <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.6"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
    warn:   <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.6"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
  };
  return d[n]||null;
};

/* ── TOAST ── */
const Toast = ({msg,type,onDone}) => {
  useEffect(()=>{ const t=setTimeout(onDone,2500); return()=>clearTimeout(t); },[]);
  return(
    <div style={{position:"fixed",bottom:90,right:16,zIndex:9999,background:type==="success"?"var(--success)":"var(--danger)",color:"white",padding:"13px 18px",borderRadius:12,fontSize:14,fontWeight:500,display:"flex",alignItems:"center",gap:9,boxShadow:"0 8px 28px rgba(0,0,0,.18)",animation:"fadeUp .3s ease",maxWidth:"calc(100vw - 32px)"}}>
      <Ic n={type==="success"?"ok":"warn"} s={16} c="white"/> {msg}
    </div>
  );
};

/* ── CONFIRM ── */
const Confirm = ({msg,onOk,onCancel}) => (
  <div className="modal-overlay" onClick={onCancel}>
    <div style={{background:"var(--bg)",borderRadius:16,padding:"28px",width:340,maxWidth:"calc(100vw - 32px)",textAlign:"center",animation:"fadeUp .2s ease",margin:"auto"}} onClick={e=>e.stopPropagation()}>
      <div style={{width:44,height:44,borderRadius:"50%",background:"#ffeaea",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}>
        <Ic n="trash" s={20} c="var(--danger)"/>
      </div>
      <p style={{fontFamily:"var(--font-d)",fontSize:17,color:"var(--dark)",marginBottom:8}}>Tem certeza?</p>
      <p style={{fontSize:13,color:"var(--taupe)",marginBottom:22}}>{msg}</p>
      <div style={{display:"flex",gap:10,justifyContent:"center"}}>
        <button className="btn-out" onClick={onCancel}>Cancelar</button>
        <button style={{padding:"11px 20px",background:"var(--danger)",color:"white",borderRadius:10,fontSize:13,fontWeight:600,border:"none",cursor:"pointer"}} onClick={onOk}>Excluir</button>
      </div>
    </div>
  </div>
);

/* ── TOGGLE ── */
const Toggle = ({on,onChange}) => (
  <button className="toggle" style={{background:on?"var(--success)":"var(--mid)"}} onClick={onChange}>
    <div className="toggle-dot" style={{left:on?21:3}}/>
  </button>
);

/* ── PRODUCT FORM MODAL ── */
const CATS = ["scrub","jaleco","conjunto","uniforme"];
const TAGS = ["","Mais Vendido","Novo","Premium","Oferta","Exclusivo"];

const ProdModal = ({product,onSave,onClose}) => {
  const isNew = !product?.id;
  const [form,setForm] = useState(product||{name:"",category:"scrub",price:"",oldPrice:"",desc:"",tag:"",active:true,colors:["#ebe2c5","#b79b85"],image:""});
  const [saving,setSaving] = useState(false);
  const [preview,setPreview] = useState(product?.image||"");
  const [colTxt,setColTxt] = useState((product?.colors||["#ebe2c5","#b79b85"]).join(", "));
  const fileRef = useRef();

  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const handleImg=(e)=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{setPreview(ev.target.result);set("image",ev.target.result);}; r.readAsDataURL(f); };

  const handleSave=(e)=>{ e.preventDefault(); if(!form.name||!form.price)return; setSaving(true);
    setTimeout(()=>{ const cols=colTxt.split(",").map(s=>s.trim()).filter(Boolean); onSave({...form,colors:cols,price:parseFloat(form.price),oldPrice:form.oldPrice?parseFloat(form.oldPrice):null,id:form.id||Date.now()}); setSaving(false); },500);
  };

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box desktop" onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{padding:"20px 22px 16px",borderBottom:"1px solid var(--cream)",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:"var(--bg)",zIndex:10,borderRadius:"20px 20px 0 0"}}>
          <h2 style={{fontFamily:"var(--font-d)",fontSize:19,color:"var(--dark)"}}>{isNew?"Novo Produto":"Editar Produto"}</h2>
          <button onClick={onClose} style={{padding:8}}><Ic n="x" s={20} c="var(--taupe)"/></button>
        </div>

        <form onSubmit={handleSave} style={{padding:"22px"}}>
          <div className="form-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            {/* Nome */}
            <div style={{gridColumn:"1/-1"}}>
              <label className="lbl">Nome do produto *</label>
              <input className="inp" value={form.name} onChange={e=>set("name",e.target.value)} placeholder="Ex: Jaleco Elegance Premium" required/>
            </div>
            {/* Categoria + Tag */}
            <div>
              <label className="lbl">Categoria</label>
              <select className="inp" value={form.category} onChange={e=>set("category",e.target.value)}>
                {CATS.map(c=><option key={c} value={c}>{c.charAt(0).toUpperCase()+c.slice(1)}</option>)}
              </select>
            </div>
            <div>
              <label className="lbl">Etiqueta destaque</label>
              <select className="inp" value={form.tag||""} onChange={e=>set("tag",e.target.value||null)}>
                {TAGS.map(t=><option key={t} value={t}>{t||"— Nenhuma —"}</option>)}
              </select>
            </div>
            {/* Preços */}
            <div>
              <label className="lbl">Preço (R$) *</label>
              <input className="inp" type="number" step="0.01" min="0" value={form.price} onChange={e=>set("price",e.target.value)} placeholder="0,00" required/>
            </div>
            <div>
              <label className="lbl">Preço anterior (opcional)</label>
              <input className="inp" type="number" step="0.01" min="0" value={form.oldPrice||""} onChange={e=>set("oldPrice",e.target.value)} placeholder="Para mostrar desconto"/>
            </div>
            {/* Descrição */}
            <div style={{gridColumn:"1/-1"}}>
              <label className="lbl">Descrição</label>
              <textarea className="inp" value={form.desc} onChange={e=>set("desc",e.target.value)} placeholder="Tecido, modelagem, diferenciais..." rows={3} style={{resize:"vertical"}}/>
            </div>
            {/* Cores */}
            <div style={{gridColumn:"1/-1"}}>
              <label className="lbl">Cores (hex separados por vírgula)</label>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <input className="inp" style={{flex:1}} value={colTxt} onChange={e=>setColTxt(e.target.value)} placeholder="#ebe2c5, #b79b85"/>
                <div style={{display:"flex",gap:5,flexShrink:0}}>
                  {colTxt.split(",").map(c=>c.trim()).filter(c=>/^#[0-9a-fA-F]{6}$/.test(c)).slice(0,5).map((c,i)=>(
                    <div key={i} style={{width:26,height:26,borderRadius:"50%",background:c,border:"2px solid var(--mid)"}}/>
                  ))}
                </div>
              </div>
            </div>
            {/* Imagem */}
            <div style={{gridColumn:"1/-1"}}>
              <label className="lbl">Imagem do produto</label>
              <div className="form-img-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                <div>
                  <div onClick={()=>fileRef.current?.click()} style={{border:"2px dashed var(--mid)",borderRadius:12,padding:"20px",textAlign:"center",cursor:"pointer",background:"var(--cream-light)"}}>
                    <Ic n="upload" s={26} c="var(--taupe)"/>
                    <p style={{fontSize:13,color:"var(--taupe)",marginTop:8,fontWeight:500}}>Clique para enviar foto</p>
                    <p style={{fontSize:11,color:"var(--mid)",marginTop:3}}>JPG, PNG — recomendado 600×800px</p>
                  </div>
                  <input ref={fileRef} type="file" accept="image/*" onChange={handleImg} style={{display:"none"}}/>
                  <div style={{marginTop:10}}>
                    <label className="lbl" style={{marginBottom:4}}>Ou cole uma URL de imagem</label>
                    <input className="inp" style={{fontSize:12}} value={typeof form.image==="string"&&!form.image.startsWith("data:")?form.image:""} onChange={e=>{set("image",e.target.value);setPreview(e.target.value);}} placeholder="https://..."/>
                  </div>
                </div>
                <div style={{borderRadius:12,overflow:"hidden",border:"1px solid var(--mid)",background:"var(--cream-light)",aspectRatio:"3/4",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {preview?<img src={preview} alt="Preview" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={()=>setPreview("")}/>:<div style={{textAlign:"center",color:"var(--mid)"}}><Ic n="img" s={30} c="var(--mid)"/><p style={{fontSize:12,marginTop:6}}>Prévia</p></div>}
                </div>
              </div>
            </div>
            {/* Ativo */}
            <div style={{gridColumn:"1/-1",display:"flex",alignItems:"center",justifyContent:"space-between",background:"var(--cream-light)",borderRadius:12,padding:"14px 18px"}}>

  );
};

        </div>
        <div style={{display:"flex",gap:8}}>
          <a href="index.html" target="_blank" style={{padding:"7px 10px",background:"rgba(255,255,255,.1)",borderRadius:8,color:"rgba(235,226,197,.7)",fontSize:11,textDecoration:"none",display:"flex",alignItems:"center",gap:5}}>
            <Ic n="eye" s={13} c="rgba(235,226,197,.7)"/> Site
          </a>
          <button onClick={()=>{sessionStorage.removeItem("vitclin_admin");setAuthed(false);}} style={{padding:"7px 10px",background:"rgba(255,255,255,.08)",borderRadius:8,color:"rgba(235,226,197,.5)",fontSize:11,display:"flex",alignItems:"center",gap:5}}>
            <Ic n="logout" s={13} c="rgba(235,226,197,.5)"/> Sair
          </button>
        </div>
      </div>
      )}

      {/* MAIN */}
      <main className="main-content">
        {tab==="dashboard"&&<Dashboard products={products} setTab={setTab}/>}
        {tab==="products"&&<ProductsTab products={products} setProducts={setProducts} showToast={showToast}/>}
        {tab==="settings"&&<SettingsTab showToast={showToast}/>}
      </main>

      {/* BOTTOM NAV — mobile only */}
      {mobile && (
      <div className="bottom-nav">
        <div className="bottom-nav-inner">
          {navItems.map(item=>(
            <button key={item.id} className={`bottom-nav-btn${tab===item.id?" active":""}`} onClick={()=>setTab(item.id)}>
              <Ic n={item.icon} s={22} c={tab===item.id?"var(--cream)":"rgba(235,226,197,.4)"}/>
              {item.label}
            </button>
          ))}
        </div>
      </div>
      )}

      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
